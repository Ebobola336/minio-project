# @file nginx.conf
# @brief Конфигурация Nginx как TLS reverse-proxy перед кластером MinIO.
# @author Тимошенко (заполнить ФИО)
# @date 2025-05-25
# @version 1.0.0

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # Логирование в stdout/stderr Docker
  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  # Производительность
  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Максимальный размер тела (0 = без ограничений, нужно для загрузки объектов)
  client_max_body_size 0;
  proxy_buffering      off;
  proxy_request_buffering off;

  # TLS-политика безопасности
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache         shared:SSL:10m;
  ssl_certificate           /etc/nginx/certs/server.crt;
  ssl_certificate_key       /etc/nginx/certs/server.key;

  # Upstream: балансировка нагрузки между 4 нодами MinIO (S3 API, порт 9000)
  upstream minio_s3 {
    least_conn;
    server minio1:9000;
    server minio2:9000;
    server minio3:9000;
    server minio4:9000;
  }

  # Upstream: MinIO Console (порт 9001, WebSocket)
  upstream minio_console {
    least_conn;
    server minio1:9001;
    server minio2:9001;
    server minio3:9001;
    server minio4:9001;
  }

  # Сервер: S3 API (HTTPS, порт 9000)
  server {
    listen 9000 ssl;
    server_name localhost;

    # Заголовки безопасности
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;

    location / {
      proxy_pass             http://minio_s3;
      proxy_set_header Host  $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 300;
      proxy_send_timeout    300;
      proxy_read_timeout    300;
    }
  }

  # Сервер: MinIO Console (HTTPS, порт 9443, WebSocket)
  server {
    listen 9443 ssl;
    server_name localhost;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;

    location / {
      proxy_pass                http://minio_console;
      proxy_set_header Host     $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # WebSocket upgrade — обязателен для MinIO Console
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
