# @file 99-hardening.conf
# @brief Тюнинг параметров ядра Linux и hardening безопасности для сервера MinIO.
# @author Тимошенко (заполнить ФИО)
# @date 2025-05-25

# Защита от SYN-flood (при исчерпании очереди сервер использует cookies)
net.ipv4.tcp_syncookies = 1

# Максимальный размер очереди SYN (увеличен для MinIO под нагрузкой)
net.ipv4.tcp_max_syn_backlog = 4096

# Игнорирование ICMP broadcast (защита от Smurf-атак)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Защита от IP-спуфинга (Reverse Path Filtering)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Отключение Source Routing (устаревший и опасный механизм)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# Запрет ICMP Redirect (защита от MitM на уровне маршрутизации)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0

# Оптимизация буферов TCP для передачи крупных объектов MinIO
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864

# Защита нулевой страницы памяти (от NULL pointer dereference атак)
vm.mmap_min_addr = 65536

# Ограничение доступа к логам ядра для обычных пользователей
kernel.dmesg_restrict = 1

# Отключение Magic SysRq на серверах
kernel.sysrq = 0
